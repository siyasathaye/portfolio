<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <link rel="stylesheet" href="../style.css" />
</head>
<body>
    <h1 class="projects-title">Projects</h1>
    <div class="projects-chart-layout">
        <svg id="projects-pie-plot" viewBox="-50 -50 100 100" aria-label="Projects per year pie chart"></svg>
        <ul class="legend" aria-label="Projects per year legend"></ul>
    </div>
    <input
        class="searchBar"
        type="search"
        aria-label="Search projects"
        placeholder="Search projects…"
    />
    <section class="projects"></section>
    <script type="module" src="../global.js"></script>
    <script type="module" src="projects.js"></script>
</body>
</html>
